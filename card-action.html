<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직장생활백서 카드 액션 데모</title>
  <style>
:root {
  --bg-0: #05060a;
  --bg-1: #0d1020;
  --glow-gold: #ffcf70;
  --glow-hot: #ff7a18;
  --glow-red: #ff4d6d;
  --text-main: #f8f5ef;
  --text-soft: rgba(248, 245, 239, 0.7);
  --card-w: 190px;
  --card-h: 270px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at 50% 42%, rgba(255, 180, 95, 0.14), transparent 24%),
    radial-gradient(circle at 20% 20%, rgba(86, 98, 255, 0.08), transparent 30%),
    linear-gradient(180deg, var(--bg-1), var(--bg-0) 66%);
  color: var(--text-main);
  font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
  overflow: hidden;
}

body {
  display: grid;
  place-items: center;
}

.scene {
  position: relative;
  width: min(100vw, 1500px);
  height: 100vh;
  min-height: 760px;
  overflow: hidden;
}

.stage {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  perspective: 1600px;
  transform-style: preserve-3d;
}

.card-cloud {
  position: relative;
  width: min(76vw, 1080px);
  height: min(62vh, 700px);
  transform-style: preserve-3d;
  filter: drop-shadow(0 30px 35px rgba(0, 0, 0, 0.38));
  transform: translate3d(0, 96px, 0);
  transition: transform 520ms cubic-bezier(0.18, 0.9, 0.22, 1);
}

.card-cloud.is-launching {
  transform: translate3d(0, -92px, 0);
}

.card-cloud.is-dropping {
  transform: translate3d(0, -16px, 0);
}

.card {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--card-w);
  height: var(--card-h);
  margin-left: calc(var(--card-w) * -0.5);
  margin-top: calc(var(--card-h) * -0.5);
  border-radius: 18px;
  overflow: hidden;
  transform-style: preserve-3d;
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow:
    0 24px 50px rgba(0, 0, 0, 0.35),
    0 0 28px rgba(255, 161, 83, 0.1),
    inset 0 0 0 1px rgba(255, 255, 255, 0.07);
  background: linear-gradient(160deg, rgba(255, 255, 255, 0.08), transparent 36%);
  transition:
    transform 760ms cubic-bezier(0.16, 1, 0.3, 1),
    opacity 260ms ease,
    filter 360ms ease,
    box-shadow 360ms ease;
  opacity: 0;
  filter: saturate(0.8) brightness(0.86);
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 26%),
    linear-gradient(160deg, transparent 40%, rgba(255, 255, 255, 0.16) 52%, transparent 64%);
  mix-blend-mode: screen;
  pointer-events: none;
}

.card::after {
  content: "";
  position: absolute;
  inset: auto -15% -38% -15%;
  height: 46%;
  background: radial-gradient(circle, rgba(255, 198, 99, 0.34), transparent 70%);
  transform: translateZ(-1px);
  filter: blur(18px);
  pointer-events: none;
}

.card-inner {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: 1fr auto;
  background:
    radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.16), transparent 28%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 30%),
    var(--card-gradient);
}

.card-art {
  position: relative;
  overflow: hidden;
}

.card-art::before,
.card-art::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  opacity: 0.9;
  mix-blend-mode: screen;
}

.card-art::before {
  inset: 16% auto auto 14%;
  width: 72%;
  height: 72%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.42), transparent 60%);
}

.card-art::after {
  inset: auto 12% 9% auto;
  width: 46%;
  height: 46%;
  background: radial-gradient(circle, rgba(255, 192, 120, 0.6), transparent 68%);
}

.silhouette {
  position: absolute;
  inset: auto 15% 8% 15%;
  height: 68%;
  background:
    radial-gradient(circle at 50% 18%, rgba(255, 232, 220, 0.92), transparent 13%),
    radial-gradient(circle at 34% 54%, rgba(25, 20, 34, 0.95), transparent 25%),
    radial-gradient(circle at 64% 54%, rgba(25, 20, 34, 0.95), transparent 25%),
    radial-gradient(circle at 50% 70%, rgba(20, 13, 25, 0.96), transparent 34%);
  filter: blur(1px);
  opacity: 0.94;
}

.card-meta {
  padding: 14px 14px 16px;
  background: linear-gradient(180deg, rgba(5, 8, 18, 0.08), rgba(5, 8, 18, 0.8));
}

.card-topline,
.card-stats {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.card-topline {
  margin-bottom: 10px;
}

.rarity {
  display: inline-grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.12);
}

.card-name {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.card-skill {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.78);
  min-height: 32px;
  line-height: 1.35;
}

.card-stats {
  margin-top: 12px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.88);
}

.card-stat {
  display: flex;
  align-items: center;
  gap: 6px;
}

.card.is-active {
  opacity: 1;
  filter: saturate(1.08) brightness(1);
}

.card.is-stacked {
  opacity: 0.96;
  filter: saturate(0.84) brightness(0.9);
}

.card.is-orbiting {
  filter: saturate(1) brightness(0.98);
}

.card.is-dimmed {
  opacity: 0.12;
  filter: saturate(0.24) brightness(0.34) blur(0.8px);
}

.card.is-reward {
  box-shadow:
    0 46px 86px rgba(0, 0, 0, 0.58),
    0 0 92px rgba(255, 196, 102, 0.44),
    inset 0 0 0 1px rgba(255, 255, 255, 0.18);
}

.card.is-launching {
  filter: saturate(0.92) brightness(1.02);
  box-shadow:
    0 34px 62px rgba(0, 0, 0, 0.42),
    0 0 40px rgba(255, 182, 88, 0.18),
    inset 0 0 0 1px rgba(255, 255, 255, 0.09);
}

.ambient,
.ring,
.burst,
.shockwave,
.spark-burst,
.reward-aura {
  position: absolute;
  pointer-events: none;
}

.ambient {
  width: 52vmax;
  height: 52vmax;
  border-radius: 50%;
  filter: blur(45px);
  opacity: 0.32;
}

.ambient-left {
  left: -15vmax;
  top: -12vmax;
  background: radial-gradient(circle, rgba(81, 120, 255, 0.26), transparent 64%);
}

.ambient-right {
  right: -20vmax;
  bottom: -20vmax;
  background: radial-gradient(circle, rgba(255, 135, 47, 0.28), transparent 64%);
}

.ring {
  left: 50%;
  top: 50%;
  border-radius: 50%;
  border: 1px solid rgba(255, 195, 110, 0.2);
  transform: translate(-50%, -50%) rotateX(77deg);
  box-shadow: 0 0 26px rgba(255, 165, 86, 0.12);
}

.ring-a {
  width: min(52vw, 760px);
  height: min(52vw, 760px);
  animation: spinA 12s linear infinite;
}

.ring-b {
  width: min(36vw, 520px);
  height: min(36vw, 520px);
  border-color: rgba(255, 224, 162, 0.3);
  animation: spinB 8s linear infinite reverse;
}

.burst {
  left: 50%;
  top: 50%;
  width: 360px;
  height: 360px;
  transform: translate(-50%, -50%);
  background:
    radial-gradient(circle, rgba(255, 210, 121, 0.18), transparent 38%),
    radial-gradient(circle, rgba(255, 114, 51, 0.14), transparent 55%);
  filter: blur(18px);
  animation: pulse 4s ease-in-out infinite;
}

.burst.is-flashing {
  animation: none;
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.36);
  background:
    radial-gradient(circle, rgba(255, 241, 214, 0.74), transparent 20%),
    radial-gradient(circle, rgba(255, 195, 109, 0.46), transparent 42%),
    radial-gradient(circle, rgba(255, 122, 24, 0.24), transparent 68%);
  transition:
    transform 180ms ease,
    opacity 280ms ease,
    background 180ms ease;
}

.shockwave {
  left: 50%;
  top: 50%;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 2px solid rgba(255, 219, 155, 0.55);
  transform: translate(-50%, -50%) scale(0.2);
  opacity: 0;
  filter: blur(1px);
}

.shockwave.is-firing {
  opacity: 1;
  transform: translate(-50%, -50%) scale(3.8);
  transition:
    transform 420ms cubic-bezier(0.14, 0.74, 0.2, 1),
    opacity 420ms ease;
}

.spark-burst {
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  transform-style: preserve-3d;
}

.spark {
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 92px;
  margin-left: -3px;
  margin-top: -92px;
  border-radius: 999px;
  opacity: 0;
  transform-origin: 50% 100%;
  background: linear-gradient(180deg, rgba(255, 252, 244, 0.95), rgba(255, 173, 72, 0.7), transparent 82%);
  box-shadow: 0 0 16px rgba(255, 187, 94, 0.28);
}

.spark::after {
  content: "";
  position: absolute;
  left: 50%;
  top: -10px;
  width: 10px;
  height: 10px;
  margin-left: -5px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 245, 232, 0.95), rgba(255, 183, 92, 0.1) 72%);
}

.spark.is-firing {
  animation: sparkFly 520ms cubic-bezier(0.12, 0.7, 0.2, 1) forwards;
}

.reward-aura {
  left: 50%;
  top: 50%;
  width: 340px;
  height: 340px;
  transform: translate(-50%, -50%) scale(0.78);
  opacity: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(255, 237, 196, 0.42), transparent 26%),
    radial-gradient(circle, rgba(255, 185, 82, 0.28), transparent 48%),
    radial-gradient(circle, rgba(255, 116, 32, 0.12), transparent 68%);
  filter: blur(10px);
  transition:
    opacity 320ms ease,
    transform 560ms cubic-bezier(0.16, 1, 0.3, 1);
}

.reward-aura::before,
.reward-aura::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.reward-aura::before {
  width: 100%;
  height: 100%;
  border: 1px solid rgba(255, 214, 145, 0.36);
  box-shadow: 0 0 36px rgba(255, 188, 82, 0.18);
}

.reward-aura::after {
  width: 62%;
  height: 62%;
  border: 2px solid rgba(255, 231, 185, 0.4);
}

.reward-aura.is-visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.12);
}

.reward-copy {
  position: absolute;
  left: 50%;
  top: calc(50% + 210px);
  z-index: 5;
  min-width: 260px;
  text-align: center;
  transform: translate(-50%, 20px);
  opacity: 0;
  transition:
    opacity 280ms ease,
    transform 420ms cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none;
}

.reward-copy.is-visible {
  opacity: 1;
  transform: translate(-50%, 0);
}

.reward-label {
  margin: 0 0 8px;
  color: #ffd491;
  letter-spacing: 0.28em;
  font-size: 11px;
}

.reward-copy h2 {
  margin: 0;
  font-size: clamp(26px, 3vw, 42px);
  font-weight: 800;
  text-shadow: 0 0 24px rgba(255, 192, 93, 0.2);
}

.hud {
  position: absolute;
  left: clamp(18px, 4vw, 56px);
  bottom: clamp(18px, 4vw, 52px);
  width: min(460px, calc(100vw - 36px));
  z-index: 3;
}

.trigger {
  appearance: none;
  border: 0;
  border-radius: 999px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #1a1205;
  cursor: pointer;
  background: linear-gradient(135deg, #ffe1ab, #ffb55e 58%, #ff874f);
  box-shadow:
    0 10px 24px rgba(255, 148, 70, 0.22),
    inset 0 1px 0 rgba(255, 255, 255, 0.44);
}

.trigger:hover {
  transform: translateY(-1px);
}

@keyframes spinA {
  from { transform: translate(-50%, -50%) rotateX(77deg) rotateZ(0deg); }
  to { transform: translate(-50%, -50%) rotateX(77deg) rotateZ(360deg); }
}

@keyframes spinB {
  from { transform: translate(-50%, -50%) rotateX(77deg) rotateZ(0deg); }
  to { transform: translate(-50%, -50%) rotateX(77deg) rotateZ(360deg); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.92); }
  50% { opacity: 0.88; transform: translate(-50%, -50%) scale(1.12); }
}

@keyframes sparkFly {
  0% {
    opacity: 0;
    transform: rotate(var(--angle)) translateY(0) scaleY(0.25);
  }
  18% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: rotate(var(--angle)) translateY(calc(var(--distance) * -1)) scaleY(1.16);
  }
}

@media (max-width: 900px) {
  :root {
    --card-w: 150px;
    --card-h: 220px;
  }

  .scene {
    min-height: 900px;
  }

  .stage {
    top: -4%;
  }

  .hud {
    bottom: 22px;
  }
}

@media (max-width: 640px) {
  :root {
    --card-w: 122px;
    --card-h: 182px;
  }

  .card-cloud {
    width: 100vw;
    height: 66vh;
  }
}
  </style>
</head>
<body>
  <main class="scene">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="ring ring-a"></div>
    <div class="ring ring-b"></div>

    <section class="stage">
      <div class="burst"></div>
      <div class="shockwave" id="shockwave"></div>
      <div class="spark-burst" id="sparkBurst" aria-hidden="true"></div>
      <div class="reward-aura" id="rewardAura" aria-hidden="true"></div>
      <div class="card-cloud" id="cardCloud" aria-label="직장생활백서 카드 애니메이션"></div>
      <div class="reward-copy" id="rewardCopy" aria-hidden="true">
        <p class="reward-label">REWARD UNLOCKED</p>
        <h2>Special Draw</h2>
      </div>
    </section>

    <section class="hud">
      <button class="trigger" id="triggerButton" type="button">다시 재생</button>
    </section>
  </main>

  <script>
/*
유지보수 가이드

1. 회전 속도를 느리게/빠르게
   - `타이밍.회전지속시간` 값을 키우면 더 오래, 천천히 돕니다.
   - `회전각목록` 숫자를 줄이면 같은 시간 동안 덜 돌아서 더 느리게 보입니다.
   - 둘 다 함께 조정하면 가장 자연스럽습니다.

2. 보상 카드가 더 빨리/늦게 나오게
   - `타이밍.보상공개지연` 값을 줄이면 더 빨리 보상 공개로 넘어갑니다.
   - `타이밍.보상카드지연` 값을 키우면 정지 후 보상 카드가 한 박자 늦게 튀어나옵니다.

3. 카드가 더 크게 원을 돌게
   - `궤도설정.회전반경X`, `궤도설정.회전반경Z` 값을 키우면 더 큼직하게 회전합니다.
   - `궤도설정.회전물결Y` 값을 키우면 위아래 움직임이 커집니다.

4. 탈락 카드가 덜 보이게/더 보이게
   - 상단 CSS의 `.card.is-dimmed`에서 `opacity`, `filter`를 조정합니다.
   - 탈락 카드의 위치는 `배경후퇴변환구하기()`에서 조정합니다.

5. 최종 보상 카드 강조를 더 크게
   - `보상변환구하기()`에서 `translate3d`, `scale` 값을 조정합니다.
   - 상단 CSS의 `.card.is-reward`, `.reward-aura`도 함께 보면 됩니다.

6. 실제 메인 흐름
   - `애니메이션재생()`
     솟구침 -> 첫 폭발 -> 회전 -> 보상 공개 순서로 동작합니다.
*/
const 카드목록 = [
  {
    name: "야근금지",
    rarity: "SR",
    skill: "퇴근 30분 전 새 업무를 받았을 때 단호하게 일정 재조정.",
    attack: 9,
    shield: 6,
    energy: 3,
    gradient: "linear-gradient(180deg, #9d2443 0%, #2b0e18 100%)",
    spreadX: -280,
    spreadY: 24,
    rotateZ: -19,
    rotateY: 18,
    depth: -30,
  },
  {
    name: "회식빠지기찬스",
    rarity: "UR",
    skill: "가족 모임, 병원 예약, 선약까지 완벽한 탈출 사유를 발동.",
    attack: 4,
    shield: 10,
    energy: 5,
    gradient: "linear-gradient(180deg, #dbb14b 0%, #473712 100%)",
    spreadX: -130,
    spreadY: -16,
    rotateZ: -9,
    rotateY: 10,
    depth: 24,
  },
  {
    name: "포상휴가",
    rarity: "SSR",
    skill: "성과 인정 완료. 월요일 오전 전체를 통째로 비워버리는 전설 카드.",
    attack: 10,
    shield: 10,
    energy: 10,
    gradient: "linear-gradient(180deg, #f4d26e 0%, #5b4116 100%)",
    spreadX: 0,
    spreadY: -44,
    rotateZ: 0,
    rotateY: 0,
    depth: 80,
  },
  {
    name: "점심시간 확보",
    rarity: "SR",
    skill: "12시 정각 자리 이탈. 애매한 미팅 요청을 1회 회피한다.",
    attack: 7,
    shield: 5,
    energy: 4,
    gradient: "linear-gradient(180deg, #c83d52 0%, #31111c 100%)",
    spreadX: 156,
    spreadY: 14,
    rotateZ: 13,
    rotateY: -14,
    depth: 10,
  },
  {
    name: "칼퇴부적",
    rarity: "UR",
    skill: "메신저 알림을 잠재우고 상사의 레이더를 교묘하게 피한다.",
    attack: 5,
    shield: 9,
    energy: 6,
    gradient: "linear-gradient(180deg, #ffd46e 0%, #614618 100%)",
    spreadX: 292,
    spreadY: -28,
    rotateZ: 20,
    rotateY: -20,
    depth: -40,
  },
];

const 타이밍 = {
  자동시작지연: 100,
  솟구침시작지연: 60,
  첫폭발지연: 520,
  회전시작지연: 640,
  보상공개지연: 6840,
  보상폭발지연: 260,
  보상카드지연: 180,
  비보상카드지연간격: 22,
  회전지속시간: 6200,
  회전카드간지연: 28,
};

const 궤도설정 = {
  카드간각도: 72,
  회전반경X: 380,
  회전반경Z: 300,
  회전기준Y: -34,
  회전물결Y: 24,
  회전기울기Y: -22,
  배경반경X: 300,
  배경반경Z: 140,
  배경깊이보정: -260,
  배경기준Y: 18,
  배경물결Y: 18,
};

const 회전각목록 = [1260, 1140, 1020, 900, 780, 660, 540, 360, 210, 90, 24, 0];
const 보상카드인덱스 = 2;

const 카드구름 = document.getElementById("cardCloud");
const 재생버튼 = document.getElementById("triggerButton");
const 중심폭발 = document.querySelector(".burst");
const 충격파 = document.getElementById("shockwave");
const 스파크버스트 = document.getElementById("sparkBurst");
const 보상오라 = document.getElementById("rewardAura");
const 보상카피 = document.getElementById("rewardCopy");
const 보상제목 = 보상카피.querySelector("h2");

let 타이머목록 = [];
let 회전애니메이션목록 = [];
let 스파크목록 = [];

function 도를라디안(도) {
  return (도 * Math.PI) / 180;
}

function 궤도각도구하기(카드인덱스, 회전도 = 0) {
  return 도를라디안((카드인덱스 - 보상카드인덱스) * 궤도설정.카드간각도 + 회전도);
}

function 전면강조도구하기(각도) {
  return (Math.cos(각도) + 1) / 2;
}

function 가시상태적용(요소, 투명도, 필터) {
  요소.style.opacity = String(투명도);
  요소.style.filter = 필터;
}

function 타이머초기화() {
  타이머목록.forEach((타이머) => window.clearTimeout(타이머));
  타이머목록 = [];
}

function 회전애니메이션초기화() {
  회전애니메이션목록.forEach((애니메이션) => 애니메이션.cancel());
  회전애니메이션목록 = [];
}

function 예약(지연시간, 작업) {
  타이머목록.push(window.setTimeout(작업, 지연시간));
}

function 카드생성(카드정보, 카드인덱스) {
  const 카드요소 = document.createElement("article");
  카드요소.className = "card";
  카드요소.style.setProperty("--card-gradient", 카드정보.gradient);
  카드요소.style.zIndex = String(20 + 카드인덱스);

  카드요소.innerHTML = `
    <div class="card-inner">
      <div class="card-art">
        <div class="silhouette"></div>
      </div>
      <div class="card-meta">
        <div class="card-topline">
          <span class="card-name">${카드정보.name}</span>
          <span class="rarity">${카드정보.rarity}</span>
        </div>
        <div class="card-skill">${카드정보.skill}</div>
        <div class="card-stats">
          <span class="card-stat">ATK ${카드정보.attack}</span>
          <span class="card-stat">DEF ${카드정보.shield}</span>
          <span class="card-stat">ENG ${카드정보.energy}</span>
        </div>
      </div>
    </div>
  `;

  카드구름.appendChild(카드요소);
  return 카드요소;
}

const 카드요소목록 = 카드목록.map(카드생성);

function 스파크생성() {
  const 스파크개수 = 18;

  for (let 인덱스 = 0; 인덱스 < 스파크개수; 인덱스 += 1) {
    const 스파크 = document.createElement("span");
    스파크.className = "spark";
    스파크.style.setProperty("--angle", `${인덱스 * (360 / 스파크개수)}deg`);
    스파크.style.setProperty("--distance", `${140 + (인덱스 % 3) * 26}px`);
    스파크.style.animationDelay = `${인덱스 * 18}ms`;
    스파크버스트.appendChild(스파크);
  }

  스파크목록 = Array.from(스파크버스트.querySelectorAll(".spark"));
}

스파크생성();

function 스택변환구하기(카드인덱스) {
  const 흔들림X = (카드인덱스 - 2) * 5;
  const 흔들림Y = 88 + (카드인덱스 % 2 === 0 ? -1 : 1) * 카드인덱스 * 3;
  const 회전 = (카드인덱스 - 2) * 1.6;
  const 깊이Z = 카드인덱스 * 18;

  return `translate3d(${흔들림X}px, ${흔들림Y}px, ${깊이Z}px) rotateZ(${회전}deg) rotateY(0deg) scale(0.65)`;
}

function 솟구침변환구하기(카드인덱스) {
  const 벌어짐X = (카드인덱스 - 2) * 8;
  const 기울기 = (카드인덱스 - 2) * 3.2;
  const 상승Y = -72 - 카드인덱스 * 8;
  const 깊이Z = 26 + 카드인덱스 * 14;

  return `translate3d(${벌어짐X}px, ${상승Y}px, ${깊이Z}px) rotateZ(${기울기}deg) rotateX(-7deg) scale(0.74)`;
}

function 보상변환구하기(카드정보) {
  const 보상스케일 = 카드정보.rarity === "SSR" ? 1.32 : 1.22;
  return `
    translate3d(0px, -46px, 320px)
    rotateZ(0deg)
    rotateY(0deg)
    rotateX(0deg)
    scale(${보상스케일})
  `;
}

function 배경후퇴변환구하기(카드정보, 카드인덱스) {
  const 각도 = 궤도각도구하기(카드인덱스);
  const 이동X = Math.sin(각도) * 궤도설정.배경반경X;
  const 이동Z = Math.cos(각도) * 궤도설정.배경반경Z + 궤도설정.배경깊이보정;
  const 이동Y = 궤도설정.배경기준Y + Math.sin(각도 * 2) * 궤도설정.배경물결Y;
  const 회전Y = Math.sin(각도) * -12;

  return `
    translate3d(${이동X}px, ${이동Y}px, ${이동Z}px)
    rotateZ(${카드정보.rotateZ * 0.22}deg)
    rotateY(${회전Y}deg)
    rotateX(${Math.cos(각도) * -2}deg)
    scale(0.58)
  `;
}

function 회전변환구하기(카드정보, 카드인덱스, 회전도) {
  const 각도 = 궤도각도구하기(카드인덱스, 회전도);
  const 이동X = Math.sin(각도) * 궤도설정.회전반경X;
  const 이동Z = Math.cos(각도) * 궤도설정.회전반경Z;
  const 이동Y = 궤도설정.회전기준Y + Math.sin(각도 * 2) * 궤도설정.회전물결Y;
  const 회전Y = Math.sin(각도) * 궤도설정.회전기울기Y;
  const 전면비율 = (이동Z + 궤도설정.회전반경Z) / (궤도설정.회전반경Z * 2);
  const 스케일 = 0.54 + 전면비율 * 0.78;

  return `
    translate3d(${이동X}px, ${이동Y}px, ${이동Z}px)
    rotateZ(${카드정보.rotateZ * 0.32}deg)
    rotateY(${회전Y}deg)
    rotateX(${Math.cos(각도) * -4}deg)
    scale(${스케일})
  `;
}

function 회전시각상태구하기(카드인덱스, 회전도) {
  const 각도 = 궤도각도구하기(카드인덱스, 회전도);
  const 강조도 = 전면강조도구하기(각도);

  return {
    opacity: 0.18 + 강조도 * 0.82,
    filter: `saturate(${0.62 + 강조도 * 0.5}) brightness(${0.5 + 강조도 * 0.6})`,
  };
}

function 스택상태로초기화() {
  회전애니메이션초기화();
  카드구름.classList.remove("is-launching", "is-dropping");
  중심폭발.classList.remove("is-flashing");
  충격파.classList.remove("is-firing");
  보상오라.classList.remove("is-visible");
  보상카피.classList.remove("is-visible");

  스파크목록.forEach((스파크) => {
    스파크.classList.remove("is-firing");
  });

  카드요소목록.forEach((카드요소, 카드인덱스) => {
    카드요소.classList.remove("is-launching", "is-orbiting", "is-dimmed", "is-reward");
    카드요소.classList.add("is-active", "is-stacked");
    카드요소.style.transitionDelay = `${카드인덱스 * 28}ms`;
    카드요소.style.zIndex = String(20 + 카드인덱스);
    가시상태적용(카드요소, 1, "");
    카드요소.style.transform = 스택변환구하기(카드인덱스);
  });
}

function 회전중상태고정() {
  카드요소목록.forEach((카드요소) => {
    const 계산된스타일 = window.getComputedStyle(카드요소);
    카드요소.style.transform = 계산된스타일.transform === "none" ? "" : 계산된스타일.transform;
    카드요소.style.opacity = 계산된스타일.opacity;
    카드요소.style.filter = 계산된스타일.filter;
  });
}

function 카드뭉치솟구치기() {
  카드구름.classList.remove("is-dropping");
  카드구름.classList.add("is-launching");

  카드요소목록.forEach((카드요소, 카드인덱스) => {
    카드요소.classList.add("is-launching", "is-active", "is-stacked");
    카드요소.style.transitionDelay = `${카드인덱스 * 26}ms`;
    카드요소.style.transform = 솟구침변환구하기(카드인덱스);
  });
}

function 폭발재생() {
  중심폭발.classList.remove("is-flashing");
  충격파.classList.remove("is-firing");

  스파크목록.forEach((스파크) => {
    스파크.classList.remove("is-firing");
    void 스파크.offsetWidth;
    스파크.classList.add("is-firing");
  });

  void 중심폭발.offsetWidth;
  중심폭발.classList.add("is-flashing");
  충격파.classList.add("is-firing");
}

function 카드회전시작() {
  보상카피.classList.remove("is-visible");
  보상오라.classList.remove("is-visible");
  회전애니메이션초기화();
  카드구름.classList.remove("is-launching");
  카드구름.classList.add("is-dropping");

  카드요소목록.forEach((카드요소, 카드인덱스) => {
    const 카드정보 = 카드목록[카드인덱스];
    카드요소.classList.remove("is-dimmed", "is-reward");
    카드요소.classList.add("is-orbiting");
    카드요소.style.transitionDelay = "0ms";
    카드요소.style.zIndex = String(40 + (카드인덱스 === 보상카드인덱스 ? 10 : 0));
    가시상태적용(카드요소, 1, "saturate(1.02) brightness(1)");

    const 회전키프레임 = 회전각목록.map((회전도) => {
      const 시각상태 = 회전시각상태구하기(카드인덱스, 회전도);
      return {
        transform: 회전변환구하기(카드정보, 카드인덱스, 회전도),
        opacity: String(시각상태.opacity),
        filter: 시각상태.filter,
      };
    });

    const 회전애니메이션 = 카드요소.animate(회전키프레임, {
      duration: 타이밍.회전지속시간,
      easing: "cubic-bezier(0.08, 0.82, 0.1, 1)",
      fill: "forwards",
      delay: 카드인덱스 * 타이밍.회전카드간지연,
    });

    회전애니메이션.onfinish = () => {
      const 마지막시각상태 = 회전시각상태구하기(카드인덱스, 0);
      카드요소.style.transform = 회전변환구하기(카드정보, 카드인덱스, 0);
      가시상태적용(카드요소, 마지막시각상태.opacity, 마지막시각상태.filter);
    };

    회전애니메이션목록.push(회전애니메이션);
  });
}

function 보상카드공개() {
  const 보상카드정보 = 카드목록[보상카드인덱스];
  보상제목.textContent = 보상카드정보.name;
  회전중상태고정();
  회전애니메이션초기화();
  void 카드구름.offsetWidth;

  카드요소목록.forEach((카드요소, 카드인덱스) => {
    const 카드정보 = 카드목록[카드인덱스];
    카드요소.classList.remove("is-orbiting");
    카드요소.style.transitionDelay =
      카드인덱스 === 보상카드인덱스
        ? `${타이밍.보상카드지연}ms`
        : `${카드인덱스 * 타이밍.비보상카드지연간격}ms`;

    if (카드인덱스 === 보상카드인덱스) {
      카드요소.classList.add("is-reward");
      카드요소.classList.remove("is-dimmed");
      카드요소.style.zIndex = "120";
      가시상태적용(카드요소, 1, "saturate(1.16) brightness(1.08)");
      카드요소.style.transform = 보상변환구하기(카드정보);
      return;
    }

    카드요소.classList.remove("is-reward");
    카드요소.classList.add("is-dimmed");
    카드요소.style.zIndex = String(10 + 카드인덱스);
    카드요소.style.transform = 배경후퇴변환구하기(카드정보, 카드인덱스);
  });

  보상오라.classList.add("is-visible");
  보상카피.classList.add("is-visible");
  예약(타이밍.보상폭발지연, 폭발재생);
}

function 애니메이션재생() {
  타이머초기화();
  스택상태로초기화();

  예약(타이밍.솟구침시작지연, 카드뭉치솟구치기);
  예약(타이밍.첫폭발지연, 폭발재생);
  예약(타이밍.회전시작지연, 카드회전시작);
  예약(타이밍.보상공개지연, 보상카드공개);
}

재생버튼.addEventListener("click", 애니메이션재생);

스택상태로초기화();
예약(타이밍.자동시작지연, 애니메이션재생);
  </script>
</body>
</html>
